<div class="bt-w-main">
  <div class="bt-w-menu">
    <p class="bgw">多源管理</p>
  </div>
  <div class="bt-w-con pd15">
    <div class="mb10">
      <button class="btn btn-success btn-sm" id="btn-health">健康检查</button>
      <button class="btn btn-default btn-sm" id="btn-master-health">主库检测</button>
      <button class="btn btn-default btn-sm" id="btn-master-preview">主库修复预览</button>
      <button class="btn btn-default btn-sm" id="btn-master-fix">主库一键修复</button>
      <label style="margin-left:8px;font-weight:normal;">
        <input type="checkbox" id="master_fix_auto_restart" style="vertical-align:middle;"> 修复后自动重启MySQL
      </label>
      <button class="btn btn-default btn-sm" id="btn-master-restart">重启MySQL</button>
      <button class="btn btn-default btn-sm" id="btn-gtid">GTID状态</button>
      <button class="btn btn-default btn-sm" id="btn-overview">总览指标</button>
      <button class="btn btn-default btn-sm" id="btn-check-tools">检测工具</button>
      <button class="btn btn-default btn-sm" id="btn-audit-logs">审计日志</button>
      <button class="btn btn-default btn-sm" id="btn-snapshots">回滚快照</button>
      <button class="btn btn-default btn-sm" id="btn-refresh">刷新来源</button>
    </div>

    <div class="mb15">
      <h3 style="margin: 0 0 8px;">主库自动修复增强（含复制账号）</h3>
      <input class="bt-input-text mr5" style="width: 120px;" id="master_repl_user" placeholder="repl_user" value="repl_user">
      <input class="bt-input-text mr5" style="width: 130px;" id="master_repl_password" placeholder="repl_password">
      <input class="bt-input-text mr5" style="width: 120px;" id="master_replica_host" placeholder="replica_host" value="%">
      <button class="btn btn-sm btn-default" id="btn-master-create-user">仅创建复制账号</button>
      <button class="btn btn-sm btn-default" id="btn-master-connect-test">连接测试向导</button>
    </div>

    <div class="mb15">
      <h3 style="margin: 0 0 8px;">添加主库来源</h3>
      <input class="bt-input-text mr5" style="width: 120px;" id="source_id" placeholder="来源ID">
      <input class="bt-input-text mr5" style="width: 120px;" id="channel_name" placeholder="通道名">
      <input class="bt-input-text mr5" style="width: 140px;" id="master_host" placeholder="主库地址">
      <input class="bt-input-text mr5" style="width: 90px;" id="master_port" placeholder="3306" value="3306">
      <input class="bt-input-text mr5" style="width: 120px;" id="repl_user" placeholder="复制账号">
      <input class="bt-input-text mr5" style="width: 120px;" id="repl_password" placeholder="复制密码">
      <button class="btn btn-sm btn-success" id="btn-add">添加</button>
    </div>

    <div class="mb15">
      <h3 style="margin: 0 0 8px;">主从协同向导（签名文件 + API握手）</h3>
      <input class="bt-input-text mr5" style="width: 100px;" id="pf_source_id" placeholder="source_id" value="m1">
      <input class="bt-input-text mr5" style="width: 120px;" id="pf_channel_name" placeholder="channel" value="ch_m1">
      <input class="bt-input-text mr5" style="width: 130px;" id="pf_master_host" placeholder="master_host">
      <input class="bt-input-text mr5" style="width: 85px;" id="pf_master_port" placeholder="3306" value="3306">
      <input class="bt-input-text mr5" style="width: 100px;" id="pf_repl_user" placeholder="repl_user" value="repl_user">
      <input class="bt-input-text mr5" style="width: 110px;" id="pf_repl_password" placeholder="repl_password">
      <button class="btn btn-sm btn-default" id="btn-export-profile">导出签名配置</button>
      <br/><br/>
      <textarea class="bt-input-text" id="profile_b64" style="width: 640px; height: 70px;" placeholder="profile_b64"></textarea>
      <button class="btn btn-sm btn-default" id="btn-verify-profile">验证配置</button>
      <button class="btn btn-sm btn-default" id="btn-import-profile">导入配置</button>
      <br/><br/>
      <input class="bt-input-text mr5" style="width: 360px;" id="handshake_token" placeholder="handshake token">
      <button class="btn btn-sm btn-default" id="btn-create-handshake">创建握手</button>
      <button class="btn btn-sm btn-default" id="btn-accept-handshake">接收握手</button>
      <button class="btn btn-sm btn-default" id="btn-handshake-status">握手状态</button>
    </div>

    <div class="mb15">
      <h3 style="margin: 0 0 8px;">库映射配置</h3>
      <p class="muted" style="color:#888;font-size:12px;margin:0 0 8px;">填写「主库库名 → 从库目标库名」即可，无需手写 JSON；高级用户可展开 JSON 查看。</p>
      <input class="bt-input-text mr5" style="width: 140px;" id="mapping_source_id" placeholder="来源ID">
      <button class="btn btn-sm btn-default" id="btn-load-mapping">载入已有映射</button>
      <button class="btn btn-sm btn-default" id="btn-add-mapping-row">添加一行</button>
      <button class="btn btn-sm btn-success" id="btn-set-mapping">保存映射</button>
      <table class="table table-hover" style="max-width:640px;margin-top:10px;">
        <thead>
          <tr>
            <th>主库库名（source_db）</th>
            <th>从库目标库名（target_db）</th>
            <th style="width:70px;">操作</th>
          </tr>
        </thead>
        <tbody id="mapping_rows"></tbody>
      </table>
      <details style="margin-top:8px;">
        <summary style="cursor:pointer;color:#666;">高级：JSON 预览（只读，保存时自动生成）</summary>
        <textarea class="bt-input-text" id="mapping_json" readonly style="width: 640px; height: 72px; margin-top:6px; background:#fafafa;" placeholder="[]"></textarea>
      </details>
    </div>

    <div class="mb15">
      <h3 style="margin: 0 0 8px;">初始化任务</h3>
      <input class="bt-input-text mr5" style="width: 140px;" id="boot_source_id" placeholder="来源ID">
      <select class="bt-input-text mr5" id="boot_mode" style="width: 120px;">
        <option value="auto">auto</option>
        <option value="physical">physical</option>
        <option value="logical">logical</option>
      </select>
      <button class="btn btn-sm btn-default" id="btn-create-boot">创建任务</button>
      <input class="bt-input-text mr5" style="width: 160px;" id="boot_task_id" placeholder="任务ID">
      <button class="btn btn-sm btn-default" id="btn-run-boot">后台执行</button>
      <button class="btn btn-sm btn-default" id="btn-cancel-boot">取消任务</button>
      <button class="btn btn-sm btn-default" id="btn-task-detail">任务详情</button>
      <button class="btn btn-sm btn-default" id="btn-task-log">任务日志</button>
      <button class="btn btn-sm btn-default" id="btn-list-boot">查看任务</button>
    </div>

    <div class="mb15">
      <h3 style="margin: 0 0 8px;">物理工具安装助手</h3>
      <select class="bt-input-text mr5" id="tool_name" style="width: 160px;">
        <option value="xtrabackup">xtrabackup</option>
        <option value="mariabackup">mariabackup</option>
      </select>
      <button class="btn btn-sm btn-default" id="btn-install-tool">一键安装</button>
      <button class="btn btn-sm btn-default" id="btn-install-tool-retry">安装重试</button>
      <button class="btn btn-sm btn-default" id="btn-copy-tool-cmd">复制安装命令</button>
      <button class="btn btn-sm btn-default" id="btn-tool-log">安装日志</button>
    </div>

    <div class="mb15">
      <h3 style="margin: 0 0 8px;">压测向导（UI）</h3>
      <input class="bt-input-text mr5" style="width: 120px;" id="stress_source_count" placeholder="来源数" value="1">
      <input class="bt-input-text mr5" style="width: 120px;" id="stress_task_per_source" placeholder="每来源任务数" value="2">
      <select class="bt-input-text mr5" id="stress_mode" style="width: 120px;">
        <option value="auto">auto</option>
        <option value="logical">logical</option>
        <option value="physical">physical</option>
      </select>
      <button class="btn btn-sm btn-default" id="btn-stress-run">开始压测</button>
      <button class="btn btn-sm btn-default" id="btn-stress-report">查看压测报告</button>
    </div>

    <table class="table table-hover">
      <thead>
        <tr>
          <th>来源ID</th>
          <th>通道</th>
          <th>主库</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="source_rows">
        <tr><td colspan="5">暂无数据</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="text/javascript">
  (function () {
    function api(method, data, cb) {
      bt_tools.send({
        url: '/plugin?action=a&name=mysql_multi_source&s=' + method,
        data: data || {}
      }, function (res) {
        cb && cb(res);
      });
    }

    function collectMappingsFromForm() {
      var list = [];
      $('#mapping_rows tr').each(function () {
        var s = ($(this).find('.mapping-source-db').val() || '').trim();
        var t = ($(this).find('.mapping-target-db').val() || '').trim();
        if (s && t) {
          list.push({ source_db: s, target_db: t });
        }
      });
      return list;
    }

    function syncMappingJsonPreview() {
      $('#mapping_json').val(JSON.stringify(collectMappingsFromForm(), null, 0));
    }

    function appendMappingRow(sourceDb, targetDb) {
      var tr = $(
        '<tr>' +
          '<td><input type="text" class="bt-input-text mapping-source-db" style="width:200px;" placeholder="例如 order_db" value="' +
          (sourceDb ? $('<div/>').text(sourceDb).html() : '') + '"></td>' +
          '<td><input type="text" class="bt-input-text mapping-target-db" style="width:200px;" placeholder="例如 m1_order_db" value="' +
          (targetDb ? $('<div/>').text(targetDb).html() : '') + '"></td>' +
          '<td><a href="javascript:;" class="btlink mapping-remove-row">删除</a></td>' +
        '</tr>'
      );
      $('#mapping_rows').append(tr);
    }

    function ensureMappingRowsInitialized() {
      if ($('#mapping_rows tr').length === 0) {
        appendMappingRow('', '');
      }
    }

    $('#mapping_rows').on('input change', '.mapping-source-db, .mapping-target-db', syncMappingJsonPreview);
    $('#mapping_rows').on('click', '.mapping-remove-row', function () {
      var tr = $(this).closest('tr');
      if ($('#mapping_rows tr').length <= 1) {
        tr.find('.mapping-source-db,.mapping-target-db').val('');
        syncMappingJsonPreview();
        return;
      }
      tr.remove();
      syncMappingJsonPreview();
    });

    $('#btn-add-mapping-row').on('click', function () {
      appendMappingRow('', '');
      syncMappingJsonPreview();
    });

    $('#btn-load-mapping').on('click', function () {
      var sourceId = $('#mapping_source_id').val();
      if (!sourceId) return layer.msg('请先填写来源ID', { icon: 0 });
      api('list_db_mappings', { source_id: sourceId }, function (res) {
        if (!res.status) return layer.msg(res.msg || '载入失败', { icon: 2 });
        $('#mapping_rows').empty();
        var arr = res.msg || [];
        if (!arr.length) {
          appendMappingRow('', '');
        } else {
          arr.forEach(function (m) {
            appendMappingRow(m.source_db || '', m.target_db || '');
          });
        }
        syncMappingJsonPreview();
        layer.msg('已载入 ' + arr.length + ' 条映射', { icon: 1 });
      });
    });

    function renderRows(list) {
      var rows = '';
      if (!list || !list.length) {
        $('#source_rows').html('<tr><td colspan="5">暂无数据</td></tr>');
        return;
      }
      list.forEach(function (item) {
        var status = (item.status && item.status.running) ? '运行中' : '已停止';
        rows += '<tr>' +
          '<td>' + item.source_id + '</td>' +
          '<td>' + item.channel_name + '</td>' +
          '<td>' + item.master_host + ':' + item.master_port + '</td>' +
          '<td>' + status + '</td>' +
          '<td>' +
            '<a href="javascript:;" class="btlink source-start mr10" data-id="' + item.source_id + '">启动</a>' +
            '<a href="javascript:;" class="btlink source-stop mr10" data-id="' + item.source_id + '">停止</a>' +
            '<a href="javascript:;" class="btlink source-test mr10" data-id="' + item.source_id + '">连通性</a>' +
            '<a href="javascript:;" class="btlink source-status mr10" data-id="' + item.source_id + '">状态</a>' +
            '<a href="javascript:;" class="btlink source-diagnose mr10" data-id="' + item.source_id + '">诊断</a>' +
            '<a href="javascript:;" class="btlink source-log mr10" data-id="' + item.source_id + '">日志</a>' +
            '<a href="javascript:;" class="btlink source-delete" data-id="' + item.source_id + '" style="color:#d9534f;">删除</a>' +
          '</td>' +
          '</tr>';
      });
      $('#source_rows').html(rows);
    }

    function refreshList() {
      api('list_sources', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '请求失败', { icon: 2 });
        renderRows(res.msg || []);
      });
    }

    $('#btn-health').on('click', function () {
      api('health_check', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '健康检查失败', { icon: 2 });
        layer.msg('来源数: ' + (res.msg.sources_count || 0), { icon: 1 });
      });
    });
    $('#btn-gtid').on('click', function () {
      api('get_gtid_status', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || 'GTID检查失败', { icon: 2 });
        layer.msg('GTID模式: ' + res.msg.gtid_mode, { icon: res.msg.enabled ? 1 : 0 });
      });
    });
    $('#btn-master-health').on('click', function () {
      api('master_health_check', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '主库检测失败', { icon: 2 });
        var rows = (res.msg.items || []).map(function (i) {
          return i.name + ' | ' + i.status + ' | 当前=' + i.current + ' | 期望=' + i.expected + ' | 建议=' + i.suggestion;
        }).join('\n');
        layer.open({ type: 1, area: ['900px', '460px'], title: '主库检测报告', content: '<div style="padding:12px;"><pre>' + rows + '</pre></div>' });
      });
    });
    $('#btn-master-preview').on('click', function () {
      api('master_auto_fix_preview', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '预览失败', { icon: 2 });
        var txt = 'need_restart=' + res.msg.need_restart + '\n' + (res.msg.actions || []).join('\n');
        layer.open({ type: 1, area: ['760px', '380px'], title: '修复预览', content: '<div style="padding:12px;"><pre>' + txt + '</pre></div>' });
      });
    });
    $('#btn-master-fix').on('click', function () {
      bt.confirm({ title: '高危操作', msg: '确认执行主库自动修复？可能修改my.cnf' }, function () {
        var autoRestart = $('#master_fix_auto_restart').is(':checked') ? '1' : '0';
        api('master_auto_fix_apply', {
          auto_restart: autoRestart,
          repl_user: $('#master_repl_user').val(),
          repl_password: $('#master_repl_password').val(),
          replica_host: $('#master_replica_host').val()
        }, function (res) {
          if (!res.status) return layer.msg(res.msg || '修复失败', { icon: 2 });
          var tail = '';
          if (res.msg.auto_restart) {
            if (res.msg.restart_result && res.msg.restart_result.ok) {
              tail = '，并已自动重启成功';
            } else if (res.msg.restart_result) {
              tail = '，自动重启失败: ' + (res.msg.restart_result.err || 'unknown');
            }
          } else if (res.msg.need_restart) {
            tail = '，建议手工重启MySQL';
          }
          layer.msg('修复完成，snapshot=' + res.msg.snapshot_id + tail, { icon: 1, time: 7000 });
        });
      });
    });
    $('#btn-master-create-user').on('click', function () {
      api('master_create_repl_user', {
        repl_user: $('#master_repl_user').val(),
        repl_password: $('#master_repl_password').val(),
        replica_host: $('#master_replica_host').val()
      }, function (res) {
        if (!res.status) return layer.msg(res.msg || '创建失败', { icon: 2 });
        layer.msg(res.msg || '创建成功', { icon: 1 });
      });
    });
    $('#btn-master-connect-test').on('click', function () {
      api('test_master_connection_direct', {
        master_host: $('#master_host').val() || $('#pf_master_host').val(),
        master_port: $('#master_port').val() || $('#pf_master_port').val() || '3306',
        repl_user: $('#master_repl_user').val() || $('#repl_user').val(),
        repl_password: $('#master_repl_password').val() || $('#repl_password').val()
      }, function (res) {
        if (!res.status) {
          var r = res.msg || {};
          return layer.msg((r.msg || '连接失败') + ' [' + (r.reason || 'unknown') + ']', { icon: 2, time: 5000 });
        }
        layer.msg((res.msg.msg || '连接成功') + ' [' + (res.msg.reason || 'ok') + ']', { icon: 1, time: 5000 });
      });
    });
    $('#btn-master-restart').on('click', function () {
      bt.confirm({ title: '高危操作', msg: '确认重启MySQL服务？' }, function () {
        api('master_restart_mysql', {}, function (res) {
          if (!res.status) return layer.msg(res.msg || '重启失败', { icon: 2 });
          layer.msg(res.msg || '重启成功', { icon: 1 });
        });
      });
    });

    $('#btn-refresh').on('click', refreshList);
    $('#btn-check-tools').on('click', function () {
      api('check_bootstrap_tools', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '检测失败', { icon: 2 });
        var r = res.msg;
        var text = 'root=' + r.is_root +
          '\nos=' + r.os_family +
          '\nxtrabackup=' + r.xtrabackup +
          '\nmariabackup=' + r.mariabackup +
          '\nmysqldump=' + r.mysqldump +
          '\nmysql=' + r.mysql +
          '\nrecommended_mode=' + r.recommended_mode;
        layer.open({
          type: 1,
          area: ['620px', '360px'],
          title: '工具检测结果',
          content: '<div style="padding:12px;"><pre>' + text + '</pre></div>'
        });
      });
    });
    $('#btn-overview').on('click', function () {
      api('overview_metrics', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '总览获取失败', { icon: 2 });
        var m = res.msg;
        layer.msg('总数=' + m.total_sources + ', 运行=' + m.running_sources + ', 停止=' + m.stopped_sources + ', 异常=' + m.error_sources + ', 初始化任务=' + m.bootstrap_tasks, { icon: 1, time: 6000 });
      });
    });
    $('#btn-audit-logs').on('click', function () {
      api('list_audit_logs', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '获取失败', { icon: 2 });
        var txt = (res.msg || []).map(function (a) {
          return a.id + ' | ' + a.action + ' | ' + JSON.stringify(a.detail);
        }).join('\n');
        layer.open({ type: 1, area: ['900px', '460px'], title: '审计日志', content: '<div style="padding:12px;"><pre>' + (txt || '暂无日志') + '</pre></div>' });
      });
    });
    $('#btn-snapshots').on('click', function () {
      api('list_change_snapshots', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '获取失败', { icon: 2 });
        var txt = (res.msg || []).map(function (s) {
          return s.snapshot_id + ' | ' + s.category + ' | ' + s.created_at;
        }).join('\n');
        layer.open({ type: 1, area: ['760px', '420px'], title: '回滚快照', content: '<div style="padding:12px;"><pre>' + (txt || '暂无快照') + '</pre></div>' });
      });
    });

    $('#btn-add').on('click', function () {
      var data = {
        source_id: $('#source_id').val(),
        channel_name: $('#channel_name').val(),
        master_host: $('#master_host').val(),
        master_port: $('#master_port').val(),
        repl_user: $('#repl_user').val(),
        repl_password: $('#repl_password').val()
      };
      api('add_source', data, function (res) {
        if (!res.status) return layer.msg(res.msg || '添加失败', { icon: 2 });
        layer.msg('添加成功', { icon: 1 });
        refreshList();
      });
    });
    $('#btn-set-mapping').on('click', function () {
      var sourceId = $('#mapping_source_id').val();
      if (!sourceId) return layer.msg('请先填写来源ID', { icon: 0 });
      syncMappingJsonPreview();
      var list = collectMappingsFromForm();
      if (!list.length) return layer.msg('请至少填写一行「主库库名」与「从库目标库名」', { icon: 0 });
      api('set_db_mappings', { source_id: sourceId, mappings: JSON.stringify(list) }, function (res) {
        if (!res.status) return layer.msg(res.msg || '映射保存失败', { icon: 2 });
        layer.msg('映射已保存', { icon: 1 });
      });
    });
    $('#btn-export-profile').on('click', function () {
      syncMappingJsonPreview();
      var data = {
        source_id: $('#pf_source_id').val(),
        channel_name: $('#pf_channel_name').val(),
        master_host: $('#pf_master_host').val(),
        master_port: $('#pf_master_port').val(),
        repl_user: $('#pf_repl_user').val(),
        repl_password: $('#pf_repl_password').val(),
        db_mappings: $('#mapping_json').val() || '[]'
      };
      api('master_export_signed_profile', data, function (res) {
        if (!res.status) return layer.msg(res.msg || '导出失败', { icon: 2 });
        $('#profile_b64').val(res.msg.profile_b64 || '');
        layer.msg('导出成功 profile_id=' + res.msg.profile_id, { icon: 1 });
      });
    });
    $('#btn-verify-profile').on('click', function () {
      api('replica_verify_profile', { profile_b64: $('#profile_b64').val() }, function (res) {
        if (!res.status) return layer.msg(res.msg || '验证失败', { icon: 2 });
        layer.msg('验证结果: ' + (res.msg.verified ? '通过' : '失败'), { icon: res.msg.verified ? 1 : 2 });
      });
    });
    $('#btn-import-profile').on('click', function () {
      api('replica_import_profile', { profile_b64: $('#profile_b64').val() }, function (res) {
        if (!res.status) return layer.msg(res.msg || '导入失败', { icon: 2 });
        layer.msg(res.msg || '导入成功', { icon: 1 });
        refreshList();
      });
    });
    $('#btn-create-handshake').on('click', function () {
      api('master_create_handshake', { profile_b64: $('#profile_b64').val() }, function (res) {
        if (!res.status) return layer.msg(res.msg || '创建失败', { icon: 2 });
        $('#handshake_token').val(res.msg.token || '');
        layer.msg('握手token已生成', { icon: 1 });
      });
    });
    $('#btn-accept-handshake').on('click', function () {
      api('replica_accept_handshake', { token: $('#handshake_token').val() }, function (res) {
        if (!res.status) return layer.msg(res.msg || '接收失败', { icon: 2 });
        layer.msg(res.msg || '接收成功', { icon: 1 });
        refreshList();
      });
    });
    $('#btn-handshake-status').on('click', function () {
      api('handshake_status', { token: $('#handshake_token').val() }, function (res) {
        if (!res.status) return layer.msg(res.msg || '查询失败', { icon: 2 });
        layer.open({ type: 1, area: ['760px', '380px'], title: '握手状态', content: '<div style="padding:12px;"><pre>' + JSON.stringify(res.msg, null, 2) + '</pre></div>' });
      });
    });
    $('#btn-create-boot').on('click', function () {
      var sourceId = $('#boot_source_id').val();
      var mode = $('#boot_mode').val();
      api('create_bootstrap_task', { source_id: sourceId, mode: mode }, function (res) {
        if (!res.status) return layer.msg(res.msg || '创建任务失败', { icon: 2 });
        var taskId = res.msg.task_id;
        layer.msg('任务创建成功: ' + taskId, { icon: 1 });
      });
    });
    $('#btn-list-boot').on('click', function () {
      api('get_bootstrap_tasks', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '任务获取失败', { icon: 2 });
        var text = (res.msg || []).map(function (t) {
          return t.task_id + ' | ' + t.source_id + ' | ' + t.mode + ' | ' + t.status + ' | ' + t.current_step;
        }).join('\n');
        layer.open({
          type: 1,
          area: ['800px', '420px'],
          title: '初始化任务列表',
          content: '<div style="padding:12px;"><pre style="max-height:360px;overflow:auto;">' + (text || '暂无任务') + '</pre></div>'
        });
      });
    });
    $('#btn-run-boot').on('click', function () {
      var taskId = $('#boot_task_id').val();
      bt.confirm({ title: '执行确认', msg: '确认后台执行任务: ' + taskId + ' ?' }, function () {
        api('trigger_bootstrap_task', { task_id: taskId }, function (res) {
          if (!res.status) return layer.msg(res.msg || '触发失败', { icon: 2 });
          layer.msg('已后台执行', { icon: 1 });
        });
      });
    });
    $('#btn-cancel-boot').on('click', function () {
      var taskId = $('#boot_task_id').val();
      bt.confirm({ title: '取消确认', msg: '确认取消任务: ' + taskId + ' ?' }, function () {
        api('cancel_bootstrap_task', { task_id: taskId }, function (res) {
          if (!res.status) return layer.msg(res.msg || '取消失败', { icon: 2 });
          layer.msg('任务已取消', { icon: 1 });
        });
      });
    });
    $('#btn-task-detail').on('click', function () {
      var taskId = $('#boot_task_id').val();
      api('get_bootstrap_task', { task_id: taskId }, function (res) {
        if (!res.status) return layer.msg(res.msg || '获取失败', { icon: 2 });
        layer.open({
          type: 1,
          area: ['760px', '420px'],
          title: '任务详情',
          content: '<div style="padding:12px;"><pre>' + JSON.stringify(res.msg, null, 2) + '</pre><div class="mt10">可每5-10秒刷新一次查看进度。</div></div>'
        });
      });
    });
    $('#btn-task-log').on('click', function () {
      var taskId = $('#boot_task_id').val();
      api('get_task_logs', { task_id: taskId }, function (res) {
        if (!res.status) return layer.msg(res.msg || '获取失败', { icon: 2 });
        layer.open({
          type: 1,
          area: ['760px', '420px'],
          title: '任务日志',
          content: '<div style="padding:12px;"><pre style="max-height:360px;overflow:auto;">' + (res.msg || '暂无日志') + '</pre></div>'
        });
      });
    });
    $('#btn-install-tool').on('click', function () {
      var toolName = $('#tool_name').val();
      bt.confirm({ title: '安装确认', msg: '确认安装工具: ' + toolName + ' ?' }, function () {
        api('install_bootstrap_tool', { tool_name: toolName }, function (res) {
          if (res.status) {
            layer.msg('安装成功', { icon: 1 });
            return;
          }
          if (res.msg && typeof res.msg === 'object' && res.msg.need_root) {
            layer.open({
              type: 1,
              area: ['760px', '300px'],
              title: '需要root手工执行',
              content: '<div style="padding:12px;"><pre>' + res.msg.msg + '\n\n手工命令:\n' + res.msg.manual_cmd + '</pre></div>'
            });
            return;
          }
          layer.msg((res.msg && res.msg.msg) || res.msg || '安装失败', { icon: 2 });
        });
      });
    });
    $('#btn-install-tool-retry').on('click', function () {
      var toolName = $('#tool_name').val();
      bt.confirm({ title: '重试确认', msg: '确认重试安装工具: ' + toolName + ' ?' }, function () {
        api('install_bootstrap_tool', { tool_name: toolName, retry: '1' }, function (res) {
          if (res.status) return layer.msg('重试安装成功', { icon: 1 });
          layer.msg((res.msg && res.msg.msg) || res.msg || '重试失败', { icon: 2 });
        });
      });
    });
    $('#btn-copy-tool-cmd').on('click', function () {
      var toolName = $('#tool_name').val();
      api('get_tool_install_command', { tool_name: toolName }, function (res) {
        if (!res.status) return layer.msg(res.msg || '获取失败', { icon: 2 });
        layer.open({
          type: 1,
          area: ['760px', '280px'],
          title: '安装命令（可复制）',
          content: '<div style="padding:12px;"><pre>' + res.msg.command + '</pre></div>'
        });
      });
    });
    $('#btn-tool-log').on('click', function () {
      api('get_tool_install_log', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '获取失败', { icon: 2 });
        layer.open({
          type: 1,
          area: ['760px', '420px'],
          title: '工具安装日志',
          content: '<div style="padding:12px;"><pre style="max-height:360px;overflow:auto;">' + (res.msg || '暂无日志') + '</pre></div>'
        });
      });
    });
    $('#btn-stress-run').on('click', function () {
      api('run_stress_wizard', {
        source_count: $('#stress_source_count').val(),
        task_per_source: $('#stress_task_per_source').val(),
        mode: $('#stress_mode').val()
      }, function (res) {
        if (!res.status) return layer.msg(res.msg || '压测启动失败', { icon: 2 });
        layer.msg('压测已启动，创建任务=' + res.msg.created + ', 失败=' + res.msg.failed, { icon: 1, time: 6000 });
      });
    });
    $('#btn-stress-report').on('click', function () {
      api('get_stress_report', {}, function (res) {
        if (!res.status) return layer.msg(res.msg || '获取失败', { icon: 2 });
        layer.open({
          type: 1,
          area: ['760px', '420px'],
          title: '压测报告',
          content: '<div style="padding:12px;"><pre>' + JSON.stringify(res.msg, null, 2) + '</pre></div>'
        });
      });
    });

    $('.plugin_body').off('click', '.source-start').on('click', '.source-start', function () {
      api('start_channel', { source_id: $(this).data('id') }, function (res) {
        if (!res.status) return layer.msg(res.msg || '启动失败', { icon: 2 });
        refreshList();
      });
    });

    $('.plugin_body').off('click', '.source-stop').on('click', '.source-stop', function () {
      api('stop_channel', { source_id: $(this).data('id') }, function (res) {
        if (!res.status) return layer.msg(res.msg || '停止失败', { icon: 2 });
        refreshList();
      });
    });
    $('.plugin_body').off('click', '.source-test').on('click', '.source-test', function () {
      api('test_source_connection', { source_id: $(this).data('id') }, function (res) {
        var msg = res.msg;
        if (typeof msg === 'object') {
          layer.msg((msg.msg || (res.status ? '连通' : '不通')) + ' [' + (msg.reason || 'unknown') + ']', { icon: res.status ? 1 : 2, time: 5000 });
        } else {
          layer.msg(msg || (res.status ? '连通' : '不通'), { icon: res.status ? 1 : 2 });
        }
      });
    });
    $('.plugin_body').off('click', '.source-status').on('click', '.source-status', function () {
      api('channel_status', { source_id: $(this).data('id') }, function (res) {
        if (!res.status) return layer.msg(res.msg || '状态获取失败', { icon: 2 });
        var msg = 'IO=' + res.msg.io_running + ', SQL=' + res.msg.sql_running + ', 延迟=' + res.msg.seconds_behind;
        if (res.msg.last_error) msg += ', 错误=' + res.msg.last_error;
        layer.msg(msg, { icon: res.msg.running ? 1 : 0, time: 5000 });
        refreshList();
      });
    });
    $('.plugin_body').off('click', '.source-diagnose').on('click', '.source-diagnose', function () {
      api('diagnose_source', { source_id: $(this).data('id') }, function (res) {
        if (!res.status) return layer.msg(res.msg || '诊断失败', { icon: 2 });
        var d = res.msg;
        var tips = (d.suggestions || []).join('\n- ');
        layer.open({
          type: 1,
          area: ['760px', '420px'],
          title: '诊断结果 - ' + d.source_id,
          content: '<div style="padding:12px;"><pre>channel: ' + d.channel_name +
            '\nnetwork_ok: ' + d.network_ok +
            '\ngtid_enabled: ' + d.gtid_enabled +
            '\nstatus: ' + JSON.stringify(d.status, null, 2) +
            '\n建议:\n- ' + tips + '</pre></div>'
        });
      });
    });
    $('.plugin_body').off('click', '.source-log').on('click', '.source-log', function () {
      api('get_source_logs', { source_id: $(this).data('id') }, function (res) {
        if (!res.status) return layer.msg(res.msg || '日志获取失败', { icon: 2 });
        layer.open({
          type: 1,
          area: ['760px', '420px'],
          title: '来源日志',
          content: '<div style="padding:12px;"><pre style="max-height:360px;overflow:auto;">' + (res.msg || '暂无日志') + '</pre></div>'
        });
      });
    });

    $('.plugin_body').off('click', '.source-delete').on('click', '.source-delete', function () {
      var sourceId = $(this).data('id');
      bt.confirm({
        title: '删除来源',
        msg: '确认删除来源: ' + sourceId + ' ?'
      }, function () {
        api('remove_source', { source_id: sourceId }, function (res) {
          if (!res.status) return layer.msg(res.msg || '删除失败', { icon: 2 });
          refreshList();
        });
      });
    });

    ensureMappingRowsInitialized();
    syncMappingJsonPreview();
    refreshList();
  })();
</script>
